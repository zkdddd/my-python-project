<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>上传数据源</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .navbar {
            background-color: #2094f3;
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 {
            margin: 0;
            font-size: 20px;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            margin-right: 15px;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            padding: 30px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #333;
            margin-top: 0;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }
        .form-group input[type="text"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }
        .form-group input[type="text"]:focus {
            outline: none;
            border-color: #2094f3;
        }
        .upload-area {
            border: 2px dashed #ddd;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }
        .upload-area:hover {
            border-color: #2094f3;
            background: #f8fbff;
        }
        .upload-area.dragover {
            border-color: #2094f3;
            background: #e3f2fd;
        }
        .upload-area input[type="file"] {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }
        .upload-icon {
            font-size: 48px;
            color: #2094f3;
            margin-bottom: 15px;
        }
        .upload-text {
            color: #666;
            font-size: 14px;
        }
        .upload-text span {
            color: #2094f3;
            font-weight: 500;
        }
        .file-types {
            margin-top: 10px;
            color: #999;
            font-size: 12px;
        }
        .file-name {
            margin-top: 15px;
            padding: 10px 15px;
            background: #f5f5f5;
            border-radius: 6px;
            display: none;
            align-items: center;
            justify-content: space-between;
        }
        .file-name.show {
            display: flex;
        }
        .file-name span {
            color: #333;
            font-size: 14px;
        }
        .file-name .remove-file {
            color: #f44336;
            cursor: pointer;
            font-size: 18px;
        }
        .btn {
            padding: 12px 30px;
            background: #2094f3;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #1976d2;
        }
        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #666;
            text-decoration: none;
        }
        .back-link:hover {
            color: #2094f3;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <h1>接口自动化测试平台</h1>
        <div>
            <a href="/data_sources">返回数据源管理</a>
        </div>
    </nav>
    <div class="container">
        <h1>上传数据源文件</h1>
        <form method="post" enctype="multipart/form-data" id="uploadForm">
            <div class="form-group">
                <label for="name">数据源名称</label>
                <input type="text" name="name" id="name" placeholder="请输入数据源名称" required>
            </div>
            <div class="form-group">
                <label>选择文件（CSV/Excel）</label>
                <div class="upload-area" id="uploadArea">
                    <input type="file" name="file" id="fileInput" accept=".csv,.xlsx" required>
                    <div class="upload-icon">📁</div>
                    <div class="upload-text">
                        <span>点击选择文件</span> 或拖拽文件到此处
                    </div>
                    <div class="file-types">支持 .csv, .xlsx 格式</div>
                </div>
                <div class="file-name" id="fileName">
                    <span id="fileNameText"></span>
                    <span class="remove-file" id="removeFile">×</span>
                </div>
            </div>
            <button type="submit" class="btn" id="submitBtn">上传</button>
        </form>
        <a href="/data_sources" class="back-link">← 返回列表</a>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const fileName = document.getElementById('fileName');
        const fileNameText = document.getElementById('fileNameText');
        const removeFile = document.getElementById('removeFile');
        const uploadForm = document.getElementById('uploadForm');
        const submitBtn = document.getElementById('submitBtn');

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                updateFileName(e.dataTransfer.files[0].name);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                updateFileName(fileInput.files[0].name);
            }
        });

        function updateFileName(name) {
            fileNameText.textContent = name;
            fileName.classList.add('show');
        }

        removeFile.addEventListener('click', () => {
            fileInput.value = '';
            fileName.classList.remove('show');
        });

        uploadForm.addEventListener('submit', () => {
            submitBtn.textContent = '上传中...';
            submitBtn.disabled = true;
        });
    </script>
</body>
</html>
