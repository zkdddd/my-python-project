<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% if case %}编辑用例{% else %}新建用例{% endif %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400:500;600;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --glass-bg: rgba(255, 255, 255, 0.92);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 2rem;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: var(--shadow-lg);
        }
        
        .page-title {
            text-align: center;
            margin-bottom: 2rem;
        }
        
        .page-title h1 {
            font-size: 1.75rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .form-card {
            background: white;
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        
        .form-section {
            padding: 1.5rem 2rem;
            border-bottom: 1px solid #f1f5f9;
        }
        
        .form-section:last-child { border-bottom: none; }
        
        .section-title {
            font-size: 1rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding-left: 0.75rem;
            border-left: 3px solid var(--primary);
        }
        
        .form-group { margin-bottom: 1.25rem; }
        
        .form-group:last-child { margin-bottom: 0; }
        
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #475569;
            font-size: 0.9rem;
        }
        
        .required::after {
            content: " *";
            color: #ef4444;
        }
        
        input[type="text"], input[type="url"], input[type="number"], textarea, select {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            transition: var(--transition);
            background: #f8fafc;
        }
        
        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }
        
        textarea { font-family: 'Fira Code', 'Consolas', monospace; resize: vertical; min-height: 80px; }
        
        .field-description {
            font-size: 0.8rem;
            color: #94a3b8;
            margin-top: 0.35rem;
        }
        
        .button-group {
            display: flex;
            gap: 1rem;
            padding: 1.5rem 2rem;
            background: #f8fafc;
            border-top: 1px solid #e2e8f0;
        }
        
        .btn-submit {
            flex: 1;
            padding: 0.85rem 2rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }
        
        .btn-back {
            padding: 0.85rem 2rem;
            background: white;
            color: #64748b;
            border: 2px solid #e2e8f0;
            border-radius: var(--radius-sm);
            font-weight: 500;
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        
        .btn-back:hover {
            background: #f1f5f9;
            border-color: #cbd5e1;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .glass-container { animation: fadeInUp 0.5s ease-out; }
        
        @media (max-width: 768px) {
            body { padding: 1rem; }
            .glass-container { padding: 1.25rem; }
            .form-section { padding: 1.25rem; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <div class="page-title">
            <h1>{% if case %}编辑用例 #{{ case.id }}{% else %}新建测试用例{% endif %}</h1>
        </div>
        
        <div class="form-card">
            <form method="post">
                <div class="form-section">
                    <div class="section-title"><i class="fas fa-info-circle"></i> 基本信息</div>
                    <div class="form-group">
                        <label class="required">用例名称</label>
                        <input type="text" name="name" value="{{ case.name if case else '' }}" required placeholder="请输入用例名称">
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title"><i class="fas fa-cog"></i> 请求配置</div>
                    <div class="form-group">
                        <label class="required">请求方法</label>
                        <select name="method">
                            <option value="GET" {% if case and case.method == 'GET' %}selected{% endif %}>GET</option>
                            <option value="POST" {% if case and case.method == 'POST' %}selected{% endif %}>POST</option>
                            <option value="PUT" {% if case and case.method == 'PUT' %}selected{% endif %}>PUT</option>
                            <option value="DELETE" {% if case and case.method == 'DELETE' %}selected{% endif %}>DELETE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="required">URL</label>
                        <input type="url" name="url" value="{{ case.url if case else '' }}" required placeholder="https://example.com/api/endpoint">
                    </div>
                    <div class="form-group">
                        <label>请求头</label>
                        <textarea name="headers" rows="3" placeholder='{"Authorization": "Bearer token"}'>{{ case.headers if case else '' }}</textarea>
                        <p class="field-description">JSON格式，可选</p>
                    </div>
                    <div class="form-group">
                        <label>请求体</label>
                        <textarea name="body" rows="5" placeholder='{"key": "value"}'>{{ case.body if case else '' }}</textarea>
                        <p class="field-description">JSON格式，可选</p>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title"><i class="fas fa-check-circle"></i> 期望结果</div>
                    <div class="form-group">
                        <label class="required">期望状态码</label>
                        <input type="number" name="expected_status" value="{{ case.expected_status if case else 200 }}" required placeholder="200">
                    </div>
                    <div class="form-group">
                        <label>期望响应体</label>
                        <textarea name="expected_body" rows="5" placeholder='{"status": "success", "data": {...}}'>{{ case.expected_body if case else '' }}</textarea>
                        <p class="field-description">JSON格式，用于比对，可选</p>
                    </div>
                    <div class="form-group">
                        <label>数据源</label>
                        <select name="data_source_id">
                            <option value="">无数据源</option>
                            {% for ds in data_sources %}
                            <option value="{{ ds.id }}" {% if case and case.data_source_id == ds.id %}selected{% endif %}>{{ ds.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>字段映射</label>
                        <textarea name="data_mapping" rows="3" placeholder='{"username":"用户名","password":"密码"}'>{{ case.data_mapping if case else '' }}</textarea>
                        <p class="field-description">JSON格式，例如 {"username":"用户名","password":"密码"}</p>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title"><i class="fas fa-shield-alt"></i> 断言配置</div>
                    <div class="form-group">
                        <label>断言列表（JSON格式）</label>
                        <textarea name="assertions_json" rows="8" placeholder='[{"type": "status_code", "condition": "equals", "expected_value": 200}]'>{{ case.assertions_json if case else '' }}</textarea>
                        <p class="field-description">
                            支持类型: status_code, json_path, header, response_time, regex<br>
                            支持条件: equals, not_equals, contains, gt, lt, exists...
                        </p>
                    </div>
                </div>

                <div class="form-section">
                    <div class="section-title"><i class="fas fa-sticky-note"></i> 其他信息</div>
                    <div class="form-group">
                        <label>描述</label>
                        <textarea name="description" rows="2" placeholder="用例描述信息...">{{ case.description if case else '' }}</textarea>
                    </div>
                </div>

                <div class="button-group">
                    <button type="submit" class="btn-submit"><i class="fas fa-save"></i> 保存用例</button>
                    <a href="/" class="btn-back"><i class="fas fa-arrow-left"></i> 返回列表</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
