<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据源管理</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(255, 255, 255, 0.3);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.12);
            --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.15);
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            color: #1e293b;
        }
        
        .navbar {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 1rem 2rem;
            box-shadow: var(--shadow-sm);
        }
        
        .navbar-brand {
            font-size: 1.35rem;
            font-weight: 700;
            background: var(--bg-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin: 2rem auto;
            box-shadow: var(--shadow-lg);
            max-width: 1000px;
        }
        
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .page-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: #334155;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-sm);
            font-weight: 500;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: var(--transition);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
            color: white;
        }
        
        .table-card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-md);
            overflow: hidden;
            box-shadow: var(--shadow-md);
        }
        
        .table thead th {
            background: linear-gradient(135deg, #818cf8 0%, #6366f1 100%);
            color: white;
            border: none;
            padding: 1rem;
            font-weight: 600;
        }
        
        .table tbody tr {
            transition: var(--transition);
        }
        
        .table tbody tr:hover {
            background: rgba(99, 102, 241, 0.05);
        }
        
        .table td {
            padding: 1rem;
            vertical-align: middle;
        }
        
        .columns-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            color: #64748b;
            font-size: 0.85rem;
        }
        
        .action-link {
            color: var(--danger);
            text-decoration: none;
            font-weight: 500;
            transition: var(--transition);
        }
        
        .action-link:hover {
            transform: scale(1.1);
        }
        
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 255, 255, 0.7);
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-md);
        }
        
        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: var(--bg-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0.8;
        }
        
        .empty-state p {
            color: #64748b;
            margin-bottom: 1.5rem;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .glass-container { animation: fadeInUp 0.5s ease-out; }
        
        @media (max-width: 768px) {
            .glass-container { margin: 1rem; padding: 1.25rem; }
            .page-header { flex-direction: column; gap: 1rem; align-items: stretch; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <span class="navbar-brand"><i class="fas fa-database"></i> 数据源管理</span>
        <a href="/" class="btn-primary" style="background:rgba(255,255,255,0.7);color:var(--primary);">
            <i class="fas fa-home"></i> 返回首页
        </a>
    </nav>
    
    <div class="glass-container">
        <div class="page-header">
            <h2 class="page-title"><i class="fas fa-database"></i> 数据源列表</h2>
            <a href="/data_source/new" class="btn-primary">
                <i class="fas fa-plus"></i> 上传新数据源
            </a>
        </div>
        
        {% if sources %}
        <div class="table-card">
            <table class="table">
                <thead>
                    <tr>
                        <th style="width: 60px;">ID</th>
                        <th>名称</th>
                        <th>列名</th>
                        <th>上传时间</th>
                        <th style="width: 80px;">操作</th>
                    </tr>
                </thead>
                <tbody>
                    {% for s in sources %}
                    <tr>
                        <td><span class="badge bg-secondary bg-opacity-10">#{{ s.id }}</span></td>
                        <td><strong>{{ s.name }}</strong></td>
                        <td class="columns-cell" title="{{ s.columns }}">{{ s.columns }}</td>
                        <td><code style="color:#64748b;font-size:0.85rem;">{{ s.created_at }}</code></td>
                        <td>
                            <a href="/data_source/{{ s.id }}/delete" class="action-link" onclick="return confirm('确定删除？')" title="删除">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
        {% else %}
        <div class="empty-state">
            <i class="fas fa-inbox"></i>
            <p>暂无数据源，请先上传</p>
            <a href="/data_source/new" class="btn-primary">上传数据源</a>
        </div>
        {% endif %}
    </div>
</body>
</html>
