<!DOCTYPE html>
<html>
<head>
    <title>数据源列表</title>
</head>
<body>
    <h1>数据源列表</h1>
    <a href="/data_source/new">上传新数据源</a>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>名称</th>
            <th>列名</th>
            <th>上传时间</th>
            <th>操作</th>
        </tr>
        {% for s in sources %}
        <tr>
            <td>{{ s.id }}</td>
            <td>{{ s.name }}</td>
            <td>{{ s.columns }}</td>
            <td>{{ s.created_at }}</td>
            <td><a href="/data_source/{{ s.id }}/delete" onclick="return confirm('确定删除？')">删除</a></td>
        </tr>
        {% endfor %}
    </table>
    <p><a href="/">返回首页</a></p>
</body>
</html>
